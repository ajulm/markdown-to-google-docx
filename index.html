  <div class="app">

      </div>
      <div class="toolbar">
        <button id="loadExample" title="Load an example">Example</button>
        <button id="clearBtn" title="Clear input">Clear</button>
        <button id="copyBtn" class="primary" title="Copy formatted output for Google Docs">Copy for Docs</button>
      </div>
    </header>

    <section class="panes">
      <div class="pane">
        <div class="pane-head">
          <span class="label">Markdown</span>
          <span class="meta" id="charCount">0 chars</span>
        </div>
        <textarea id="input" spellcheck="false" placeholder="Type or paste Markdown here…

# Like this
**bold**, *italic*, [links](https://example.com), `code`,
- lists
- and tables

Then hit ‘Copy for Docs’ and paste into Google Docs."></textarea>
      </div>

      <div class="pane">
        <div class="pane-head">
          <span class="label">Preview</span>
          <span class="meta" id="wordCount">0 words</span>
        </div>
        <div id="preview"></div>

<script>
  // Configure marked: GFM, line breaks, no mangling
  marked.setOptions({
    gfm: true,
    breaks: false,
    headerIds: false,
    mangle: false,
  });

  const input    = document.getElementById('input');
  const preview  = document.getElementById('preview');
  const copyBtn  = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');
  const exampleBtn = document.getElementById('loadExample');
  const charCount = document.getElementById('charCount');
  const wordCount = document.getElementById('wordCount');
  const statusMsg = document.getElementById('statusMsg');

  const EXAMPLE = `# Quarterly Update

A short *editorial* on what shipped, what slipped, and what's next.

## Highlights

- **Payouts v1.2** — BankAccount slice merged, NPI integration in review
- **SMS credits** — English 160ch / Nepali 70ch billing live
- **Docs** — \`suqo-wiki\` auto-sync running nightly

> Quality is never an accident; it is always the result of intelligent effort.

## Numbers

| Metric        | Last Qtr | This Qtr | Δ      |
|---------------|---------:|---------:|-------:|
| Active users  |      120 |      184 |  +53%  |
| Revenue (NPR) |  240,000 |  410,000 |  +71%  |
| Payouts       |        — |       38 |    —   |

## Code Snippet

\`\`\`python
def compute_payout(seller, period):
    gross = seller.collected_for(period)
    fees  = gross * Decimal("0.025")
    return gross - fees
\`\`\`

### Next Up

1. Withdrawal request UI
2. NCHL NPI debit authorization flow
3. Admin-facing reconciliation report

[Read the full doc →](https://example.com/q3)
`;

  function render() {
    const md = input.value;
    const dirty = marked.parse(md);
    const clean = DOMPurify.sanitize(dirty, { USE_PROFILES: { html: true } });

    // Preserve the preview's scroll position — replacing innerHTML resets
    // scrollTop to 0, which yanks the pane back to the top on every keystroke.
    const prevScroll = preview.scrollTop;
    preview.innerHTML = clean;

    // Syntax-highlight code blocks (adds .hljs-* class spans, colored by theme CSS)
    preview.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    preview.scrollTop = prevScroll;

    charCount.textContent = md.length + ' chars';
    const words = md.trim() ? md.trim().split(/\s+/).length : 0;
    wordCount.textContent = words + ' words';
  }

  input.addEventListener('input', render);

  clearBtn.addEventListener('click', () => {
    input.value = '';
    render();
    setStatus('Cleared.');
    input.focus();
  });

  exampleBtn.addEventListener('click', () => {
    input.value = EXAMPLE;
    render();
    setStatus('Example loaded.');
  });

  function setStatus(msg) {
    statusMsg.textContent = msg;
  }

  // -- Build a Docs-friendly HTML clone ----
  // Google Docs strips CSS classes and stylesheet rules, but it DOES respect:
  //   - inline `style="..."` on most elements
  //   - the `border` attribute on <table>
  //   - font-family inline on <pre>/<code>
  // So we clone the preview, walk it, and inline GitHub-flavored styles.
  // Note: Docs does NOT preserve border-radius — inline code "pills" land as
  // gray rectangles. Background color + monospace font still survives.
  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Serialize a highlighted <code> subtree to Docs-safe HTML:
  //   - keep hljs colors as inline <span style="color:…"> (Docs strips classes,
  //     but preserves inline color), so highlighting survives the paste
  //   - spaces -> nbsp (Docs collapses ordinary space runs, killing indentation)
  //   - newlines -> <br> (Docs would otherwise split each line into its own
  //     paragraph + outline entry)
  function serializeCode(node) {
    let out = '';
    node.childNodes.forEach(ch => {
      if (ch.nodeType === 3) { // text
        out += escHtml(ch.nodeValue).replace(/ /g, ' ').replace(/\n/g, '<br>');
      } else if (ch.nodeType === 1) { // element (hljs span)
        const color = ch.style.color;
        const inner = serializeCode(ch);
        out += color ? `<span style="color:${color}">${inner}</span>` : inner;
      }
    });
    return out;
  }

  function buildDocsHtml() {
    // Pin each hljs span's color inline on the LIVE tree before cloning —
    // getComputedStyle only resolves theme-CSS colors on in-DOM nodes.
    preview.querySelectorAll('pre code span').forEach(s => {
      s.style.color = getComputedStyle(s).color;
    });

    const root = preview.cloneNode(true);

    const MONO = "ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace";
    const BORDER = '1px solid #d0d7de';
    const HEADER_BG = '#f6f8fa';

    // Tables: bordered, header shaded, zebra rows
    root.querySelectorAll('table').forEach(t => {
      t.setAttribute('border', '1');
      t.style.borderCollapse = 'collapse';
      t.style.border = BORDER;
      t.style.margin = '8px 0';
    });
    root.querySelectorAll('th, td').forEach(c => {
      c.style.border = BORDER;
      c.style.padding = '6px 13px';
      c.style.verticalAlign = 'top';
    });
    root.querySelectorAll('th').forEach(c => {
      c.style.background = HEADER_BG;
      c.style.fontWeight = '600';
    });
    // Zebra stripes — apply background to even-indexed body rows inline,
    // since Docs ignores :nth-child rules.
    root.querySelectorAll('tbody').forEach(tbody => {
      const rows = tbody.querySelectorAll('tr');
      rows.forEach((tr, i) => {
        if (i % 2 === 1) tr.style.background = HEADER_BG;
      });
    });

    // Code blocks — wrap in a 1x1 table.
    // Docs paints a paragraph `background` only behind text runs (character
    // highlight), NOT the full block width, and each <br> line carries
    // line-leading the highlight skips — so a styled <pre> lands as broken
    // gray bands with white gaps between lines. A TABLE CELL is the one
    // construct Docs fills edge-to-edge with a uniform background on paste.
    // serializeCode keeps hljs colors inline, spaces -> nbsp (indentation),
    // \n -> <br>; blank lines get one nbsp so the cell stays one block.
    root.querySelectorAll('pre').forEach(p => {
      const codeEl = p.querySelector('code') || p;
      const code = serializeCode(codeEl)
        .replace(/(<br>)+$/, '')
        .split('<br>')
        .map(line => line.trim() === '' ? '\u00A0' : line)
        .join('<br>');

      const cellStyle = [
        `background:${HEADER_BG}`,
        `border:${BORDER}`,
        'padding:8px 12px',
        `font-family:${MONO}`,
        'font-size:6pt',
        'color:#1f2328',
        'line-height:1.1',
        'white-space:pre',
      ].join(';');

      const table = document.createElement('table');
      table.setAttribute('border', '0');
      table.setAttribute('cellspacing', '0');
      table.style.borderCollapse = 'collapse';
      table.style.width = '100%';
      table.style.margin = '8px 0';
      table.innerHTML =
        `<tbody><tr><td style="${cellStyle}">${code}</td></tr></tbody>`;
      p.replaceWith(table);
    });

    // Inline code (not inside <pre>) — gray pill
    root.querySelectorAll('code').forEach(c => {
      if (c.parentElement && c.parentElement.tagName === 'PRE') return;
      c.style.fontFamily = MONO;
      c.style.background = HEADER_BG;
      c.style.padding = '.2em .4em';
      c.style.borderRadius = '6px';
      c.style.fontSize = '85%';
      c.style.color = '#1f2328';
    });

    // Blockquotes — Docs strips border-left on a <blockquote>, so the GitHub
    // accent bar vanishes. A TABLE CELL is the one construct Docs fills
    // edge-to-edge, so render the bar as a narrow colored left cell and the
    // quote text in a right cell. border-collapse:collapse + cellspacing 0
    // keeps the bar flush against the text.
    root.querySelectorAll('blockquote').forEach(b => {
      // Zero the inner paragraph margins — Docs gives each <p> default spacing,
      // which stretches the cell taller than the text.
      b.querySelectorAll('p').forEach(p => {
        p.style.margin = '0';
        p.style.lineHeight = '1.2';
      });
      const inner = b.innerHTML;
      const barStyle = [
        'background:#d0d7de',
        'width:2px',
        'padding:0',
        'border:0',
      ].join(';');
      const textStyle = [
        'padding:0 0 0 8px',
        'border:0',
        'color:#59636e',
        'font-size:11pt',
      ].join(';');

      const table = document.createElement('table');
      table.setAttribute('border', '0');
      table.setAttribute('cellspacing', '0');
      table.style.borderCollapse = 'collapse';
      table.style.width = '100%';
      table.style.margin = '8px 0';
      table.innerHTML =
        `<tbody><tr><td style="${barStyle}"></td>` +
        `<td style="${textStyle}">${inner}</td></tr></tbody>`;
      b.replaceWith(table);
    });

    // Links
    root.querySelectorAll('a').forEach(a => {
      a.style.color = '#0969da';
      a.style.textDecoration = 'underline';
    });

    // Horizontal rule
    root.querySelectorAll('hr').forEach(h => {
      h.style.border = '0';
      h.style.borderTop = BORDER;
      h.style.margin = '12px 0';
    });

    // Headings: sans-serif, semibold, with EXPLICIT point sizes.
    // Docs' paste importer infers heading level from font-size contrast. With
    // no sizes set, headings inherit the wrapper's 11pt — same as body — so
    // Docs guesses and dumps every short/bold paragraph into the outline.
    // Distinct sizes give it an unambiguous signal: big = heading, 11pt = body.
    const H_SIZE = { H1: '22pt', H2: '17pt', H3: '14pt', H4: '12pt', H5: '11pt', H6: '11pt' };
    root.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
      h.style.fontFamily = 'Arial, sans-serif';
      h.style.fontWeight = '600';
      h.style.color = '#1f2328';
      h.style.fontSize = H_SIZE[h.tagName] || '11pt';
    });

    // Body text: pin to 11pt so Docs classifies it as Normal, not a heading.
    root.querySelectorAll('p, li, td, th, blockquote').forEach(el => {
      el.style.fontSize = '11pt';
    });

    return root.innerHTML;
  }

  // -- Copy as rich text (HTML on the clipboard) ----
  // Strategy: intercept the browser's native 'copy' event and write
  // text/html + text/plain directly into clipboardData. This works on
  // file://, requires no permissions, and is supported everywhere.
  // Falls back to navigator.clipboard.write only if execCommand fails.
  async function copyAsRichText() {
    const html  = buildDocsHtml();
    const plain = input.value;

    const wrapped =
      '<meta charset="utf-8">' +
      '<div style="font-family: Arial, sans-serif; font-size: 11pt; color: #000;">' +
      html +
      '</div>';

    // --- Primary: copy-event handler (most reliable) ---
    const handler = (e) => {
      e.preventDefault();
      e.clipboardData.setData('text/html',  wrapped);
      e.clipboardData.setData('text/plain', plain);
    };

    let ok = false;
    document.addEventListener('copy', handler);
    try {
      // execCommand('copy') needs a non-empty selection in some browsers.
      // Create one in a throwaway element.
      const stash = document.createElement('div');
      stash.textContent = '\u200B'; // zero-width char
      stash.style.position = 'fixed';
      stash.style.left = '-9999px';
      stash.style.top = '0';
      document.body.appendChild(stash);

      const range = document.createRange();
      range.selectNodeContents(stash);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      ok = document.execCommand('copy');
      sel.removeAllRanges();
      document.body.removeChild(stash);
    } catch (err) {
      console.warn('execCommand copy failed:', err);
    } finally {
      document.removeEventListener('copy', handler);
    }

    // --- Fallback: async Clipboard API ---
    if (!ok) {
      try {
        if (navigator.clipboard && window.ClipboardItem) {
          const item = new ClipboardItem({
            'text/html':  new Blob([wrapped], { type: 'text/html' }),
            'text/plain': new Blob([plain],   { type: 'text/plain' }),
          });
          await navigator.clipboard.write([item]);
          ok = true;
        }
      } catch (err) {
        console.error('Clipboard API failed:', err);
        setStatus('Copy failed: ' + err.message);
        return;
      }
    }

    if (ok) {
      flashCopySuccess();
    } else {
      setStatus('Copy failed. Try a different browser or check permissions.');
    }
  }

  function flashCopySuccess() {
    copyBtn.classList.add('success');
    copyBtn.textContent = 'Copied — paste into Docs';
    setStatus('Copied as rich text.');
    setTimeout(() => {
      copyBtn.classList.remove('success');
      copyBtn.textContent = 'Copy for Docs';
    }, 2200);
  }

  copyBtn.addEventListener('click', copyAsRichText);

  // Keyboard shortcut: Cmd/Ctrl + Enter
  input.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      copyAsRichText();
    }
  });

  // -- Synced scrolling ----
  // Drive the two panes off the same scroll fraction. A guard flag stops the
  // programmatic scrollTop write from re-firing the other pane's listener,
  // which would otherwise ping-pong and fight the user's scroll.
  let syncing = false;
  function linkScroll(from, to) {
    from.addEventListener('scroll', () => {
      if (syncing) return;
      syncing = true;
      const max = from.scrollHeight - from.clientHeight;
      const frac = max > 0 ? from.scrollTop / max : 0;
      to.scrollTop = frac * (to.scrollHeight - to.clientHeight);
      // Release after this frame so the echoed 'scroll' event is ignored.
      requestAnimationFrame(() => { syncing = false; });
    });
  }
  linkScroll(input, preview);
  linkScroll(preview, input);

  // Tagline: wrap each word in a staggered fade-up span.
  const tagEl = document.querySelector('.brand .tag');
  if (tagEl) {
    const words = tagEl.textContent.split(/(\s+)/);
    tagEl.textContent = '';
    let i = 0;
    words.forEach(tok => {
      if (/^\s+$/.test(tok)) { tagEl.appendChild(document.createTextNode(tok)); return; }
      const span = document.createElement('span');
      span.className = 'w';
      span.textContent = tok;
      span.style.animationDelay = (0.25 + i * 0.06) + 's';
      tagEl.appendChild(span);
      i++;
    });
  }

  // Initial render with example so the app doesn't look empty
  input.value = EXAMPLE;
  render();
</script>
</body>
</html>
